# SwiftLint config — lenient by design (warnings, not errors) so it can be adopted gradually without
# blocking merges. Tighten over time.
excluded:
  - .build
  - build
  - DerivedData
  - "**/.build"
  - "AppIcon Exports"
  - Packages/**/.build

disabled_rules:
  - line_length          # SwiftUI view bodies get long; not worth failing on
  - todo                 # TODO/FIXME are allowed
  - trailing_whitespace
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - nesting
  - identifier_name      # short SwiftUI identifiers (id, x, y) are fine

opt_in_rules:
  - empty_count
  - closure_spacing
  - redundant_nil_coalescing
  - operator_usage_whitespace

reporter: "github-actions-logging"
