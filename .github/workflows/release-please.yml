name: Release Please

# Conventional-commit driven SemVer. On every push to main, opens/updates a "release PR" that bumps
# version.txt + CHANGELOG.md. Merging that PR creates the tag vX.Y.Z and the GitHub Release, which in
# turn triggers the Release workflow to build & attach the IPA.
on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Release Please creates the release with GITHUB_TOKEN, which (by design) does NOT trigger the
      # Release workflow's `release: published` event. So dispatch it explicitly — workflow_dispatch
      # via GITHUB_TOKEN is allowed — to build & attach the IPA + macOS artifacts.
      - name: Build & attach artifacts for the new release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml -f tag=${{ steps.release.outputs.tag_name }} --repo "${{ github.repository }}"
