version: 2
updates:
  # Keep GitHub Actions pinned to current major versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels: ["dependencies", "ci"]

  # Swift Package Manager dependencies.
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    labels: ["dependencies"]
    open-pull-requests-limit: 5
